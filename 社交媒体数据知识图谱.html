<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交媒体数据知识图谱 - 火山引擎 企业知识引擎</title>
<style>
  :root {
    --blue: #3370ff;
    --blue-light: #6694ff;
    --blue-pale: #e8f0ff;
    --blue-bg: #f0f5ff;
    --text-1: #1d2129;
    --text-2: #4e5969;
    --text-3: #86909c;
    --text-4: #c9cdd4;
    --border: #e5e6eb;
    --border-light: #f2f3f5;
    --bg: #fff;
    --font: "PingFang SC", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "Helvetica Neue", sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);background:var(--bg);color:var(--text-1);font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

  /* TOP NAV (WHITE) */
  .topnav{height:48px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);z-index:50;position:relative}
  .tn-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .dots{display:inline-grid;grid-template-columns:repeat(3,4px);grid-template-rows:repeat(3,4px);gap:2.5px;margin-right:8px;cursor:pointer}
  .dots i{display:block;width:4px;height:4px;background:var(--text-3);border-radius:1px}
  .tn-brand{font-size:15px;font-weight:600;color:var(--text-1);letter-spacing:.2px}
  .tn-sep{width:1px;height:16px;background:var(--border);margin:0 10px 0 8px}
  .tn-prod{font-size:14px;color:var(--text-2);font-weight:400}
  .tn-menu{display:flex;align-items:center;margin-left:20px}
  .tn-menu a{display:flex;align-items:center;height:48px;padding:0 14px;font-size:14px;color:var(--text-2);text-decoration:none;cursor:pointer;white-space:nowrap;font-weight:400;transition:color .15s;position:relative}
  .tn-menu a:hover{color:var(--text-1)}
  .tn-menu a.on{color:var(--blue);font-weight:500}
  .tn-menu a.on::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--blue);border-radius:1px}
  .tn-menu .c{margin-left:2px;font-size:9px;opacity:.4}
  .tn-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
  .proj{display:flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:13px;color:var(--text-2);cursor:pointer;max-width:200px}
  .proj span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bell{position:relative;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
  .bell-b{position:absolute;top:-2px;right:-6px;background:#f53f3f;color:#fff;font-size:10px;min-width:18px;height:16px;line-height:16px;text-align:center;border-radius:8px;padding:0 4px;font-weight:600}
  .lang{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);cursor:pointer}
  .av{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer}

  /* LAYOUT */
  .layout{display:flex;height:calc(100vh - 48px)}

  /* SIDEBAR */
  .sb{width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column}
  .sb-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
  .sb-hd h3{font-size:16px;font-weight:600;color:var(--text-1)}
  .sb-add{width:24px;height:24px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sb-si{margin:0 12px 6px;position:relative}
  .sb-si input{width:100%;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 10px 0 30px;font-size:13px;color:var(--text-1);outline:none;font-family:var(--font)}
  .sb-si input::placeholder{color:var(--text-4)}
  .sb-si input:focus{border-color:var(--blue)}
  .sb-si svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none}
  .sb-ls{flex:1;overflow-y:auto;padding:4px 8px}
  .sb-it{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;cursor:pointer;font-size:13px;color:var(--text-2);font-weight:400}
  .sb-it:hover{background:var(--border-light)}
  .sb-it.on{background:var(--blue-pale);color:var(--blue);font-weight:500}
  .sb-it span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* MAIN */
  .mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .hd{background:#fff;padding:20px 24px 0;border-bottom:1px solid var(--border);flex-shrink:0}
  .hd-r1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .hd-t{font-size:20px;font-weight:600;color:var(--text-1);line-height:28px;letter-spacing:.3px}
  .hd-a{display:flex;align-items:center;gap:8px}
  .bi{width:32px;height:32px;border:1px solid var(--border);border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2)}
  .bi:hover{border-color:var(--blue);color:var(--blue)}
  .bo{height:32px;padding:0 15px;border:1px solid var(--border);border-radius:4px;background:#fff;font-size:13px;color:var(--text-1);cursor:pointer;white-space:nowrap;font-family:var(--font);font-weight:400;line-height:30px}
  .bo:hover{border-color:var(--blue);color:var(--blue)}
  .bp{height:32px;padding:0 15px;border:none;border-radius:4px;background:var(--blue);font-size:13px;color:#fff;cursor:pointer;white-space:nowrap;font-weight:500;font-family:var(--font);line-height:32px}
  .bp:hover{background:#2860e0}
  .mt{display:flex;align-items:center;gap:28px;font-size:13px;color:var(--text-3);margin-bottom:6px;line-height:22px;font-weight:400}
  .mt b{font-weight:400;color:var(--text-2);margin-left:4px}
  .mt b.lk{color:var(--blue);cursor:pointer}
  .ds{font-size:13px;color:var(--text-3);margin-bottom:14px;line-height:22px;font-weight:400}
  .ds b{font-weight:400;color:var(--text-2);margin-left:14px}
  .tb{display:flex}
  .tb a{display:block;padding:10px 0;margin-right:28px;font-size:14px;color:var(--text-2);text-decoration:none;cursor:pointer;position:relative;font-weight:400}
  .tb a.on{color:var(--text-1);font-weight:600}
  .tb a.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--blue);border-radius:1px}

  /* GRAPH SECTION */
  .gs{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .gbar{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border-light);gap:8px;flex-shrink:0}
  .gb{width:28px;height:28px;border:1px solid var(--border);border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);flex-shrink:0}
  .gsel{height:28px;min-width:72px;border:1px solid var(--border);border-radius:4px;padding:0 24px 0 10px;font-size:13px;color:var(--text-1);background:#fff url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M.7.7l3.3 3.3L7.3.7' stroke='%2386909c' fill='none' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 8px center;-webkit-appearance:none;appearance:none;cursor:pointer;outline:none;font-family:var(--font)}
  .gin{height:28px;min-width:140px;border:1px solid var(--border);border-radius:4px;padding:0 24px 0 10px;font-size:13px;color:var(--text-1);background:#fff url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M.7.7l3.3 3.3L7.3.7' stroke='%2386909c' fill='none' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 8px center;outline:none;font-family:var(--font)}
  .gin::placeholder{color:var(--text-4)}
  .grt{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
  .prog{width:120px;height:7px;background:#e8e8e8;border-radius:4px;overflow:hidden}
  .prog-in{width:100%;height:100%;background:#00b42a;border-radius:4px}

  /* CANVAS */
  .cw{flex:1;position:relative;background:#fff;overflow:hidden;display:flex}
  .cw canvas{flex:1}

  /* SIDE TOOLS */
  .tls{position:absolute;left:10px;bottom:46px;display:flex;flex-direction:column;background:#fff;border-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.08),0 0 1px rgba(0,0,0,.06);z-index:10;overflow:hidden}
  .tls button{width:28px;height:28px;border:none;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);border-bottom:1px solid var(--border-light);padding:0}
  .tls button:last-child{border-bottom:none}
  .tls button:hover{background:#f7f8fa;color:var(--blue)}
  .cfoot{position:absolute;left:10px;bottom:10px;font-size:12px;color:var(--text-3);z-index:10;pointer-events:none}

  /* DETAIL PANEL */
  .panel{position:absolute;right:0;top:0;bottom:0;width:360px;background:#fff;border-left:1px solid var(--border);box-shadow:-4px 0 16px rgba(0,0,0,.06);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
  .panel.show{transform:translateX(0)}
  .panel-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .panel-hd h4{font-size:16px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:8px}
  .panel-hd .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .panel-close{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--text-3);display:flex;align-items:center;justify-content:center;border-radius:4px}
  .panel-close:hover{background:var(--border-light);color:var(--text-1)}
  .panel-body{flex:1;overflow-y:auto;padding:0}
  .panel-sec{padding:16px 20px;border-bottom:1px solid var(--border-light)}
  .panel-sec:last-child{border-bottom:none}
  .panel-sec h5{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .panel-sec h5 .icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
  .panel-sec h5 .icon.blue{background:var(--blue-pale);color:var(--blue)}
  .panel-sec h5 .icon.green{background:#e8f5e9;color:#43a047}
  .panel-sec h5 .icon.orange{background:#fff3e0;color:#ef6c00}

  /* Attributes table */
  .attr-tbl{width:100%}
  .attr-tbl tr{border-bottom:1px solid var(--border-light)}
  .attr-tbl tr:last-child{border-bottom:none}
  .attr-tbl td{padding:8px 0;font-size:13px;vertical-align:top;line-height:20px}
  .attr-tbl td:first-child{color:var(--text-3);width:90px;font-weight:400;padding-right:12px;white-space:nowrap}
  .attr-tbl td:last-child{color:var(--text-1);font-weight:400}
  .attr-tbl .tag{display:inline-block;padding:1px 8px;border-radius:3px;font-size:12px;margin:1px 3px 1px 0;font-weight:400}
  .attr-tbl .tag.blue{background:var(--blue-pale);color:var(--blue)}
  .attr-tbl .tag.green{background:#e8f5e9;color:#2e7d32}
  .attr-tbl .tag.orange{background:#fff3e0;color:#e65100}

  /* Relations list */
  .rel-list{display:flex;flex-direction:column;gap:8px}
  .rel-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--border-light);border-radius:6px;font-size:13px;transition:background .15s}
  .rel-item:hover{background:var(--blue-pale)}
  .rel-item .arrow{color:var(--blue);font-size:12px;flex-shrink:0;font-weight:600;letter-spacing:-1px}
  .rel-item .rtype{color:var(--text-3);font-size:12px;min-width:56px;text-align:center;flex-shrink:0}
  .rel-item .rname{color:var(--text-1);font-weight:500}
  .rel-item .rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<!-- TOP NAV -->
<header class="topnav">
  <div class="tn-left">
    <span class="dots"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
    <svg width="22" height="22" viewBox="0 0 100 100" fill="none" style="flex-shrink:0"><path d="M30 85L50 15l8 30 15-18-18 58z" fill="#3370ff"/><path d="M55 85l15-70 6 28 12-15-15 57z" fill="#5B8FF9" opacity=".55"/></svg>
    <span class="tn-brand">火山引擎</span>
    <span class="tn-sep"></span>
    <span class="tn-prod">企业知识引擎</span>
  </div>
  <nav class="tn-menu">
    <a>智能问答</a><a>数据接入<span class="c">▾</span></a><a class="on">知识管理<span class="c">▾</span></a><a>主体建模</a><a>AI应用</a><a>AgentDemo<span class="c">▾</span></a><a>项目中心</a>
  </nav>
  <div class="tn-right">
    <div class="proj"><span>汽车.../汽车行业Demo</span><span style="font-size:9px;opacity:.4">▾</span></div>
    <div class="bell"><svg width="18" height="18" viewBox="0 0 48 48" fill="none"><path d="M24 44c2.2 0 4-1.8 4-4H20c0 2.2 1.8 4 4 4zm14-12V22c0-7.2-4.8-13.2-12-14.8V6c0-1.1-.9-2-2-2s-2 .9-2 2v1.2C14.8 8.8 10 14.8 10 22v10l-4 4v2h36v-2l-4-4z" fill="#4e5969"/></svg><span class="bell-b">71</span></div>
    <div class="lang"><svg width="15" height="15" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#4e5969" stroke-width="3" fill="none"/><ellipse cx="24" cy="24" rx="10" ry="20" stroke="#4e5969" stroke-width="3" fill="none"/><line x1="4" y1="24" x2="44" y2="24" stroke="#4e5969" stroke-width="3"/></svg>简体中文</div>
    <div class="av">A</div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-hd"><h3>图谱目录</h3><button class="sb-add"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="6" x2="11" y2="6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>
    <div class="sb-si"><svg width="13" height="13" viewBox="0 0 48 48" fill="#c9cdd4"><path d="M20.5 6C12.5 6 6 12.5 6 20.5S12.5 35 20.5 35c3.9 0 7.4-1.5 10.1-4l13.2 13.2 2.8-2.8L33.4 28.2c2-2.5 3.1-5.6 3.1-8.7C36.5 11.5 29.5 6 20.5 6zm0 25C15 31 10 26 10 20.5S15 10 20.5 10 31 15 31 20.5 26 31 20.5 31z"/></svg><input type="text" placeholder="搜索图谱" aria-label="搜索图谱"></div>
    <div class="sb-ls">
      <div class="sb-it on">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><circle cx="8" cy="4" r="2.8" fill="#3370ff" opacity=".8"/><circle cx="3.5" cy="12.5" r="2.2" fill="#3370ff" opacity=".6"/><circle cx="12.5" cy="11.5" r="2.2" fill="#3370ff" opacity=".6"/><line x1="7.5" y1="6.8" x2="4.5" y2="10.5" stroke="#3370ff" stroke-width=".9" opacity=".4"/><line x1="8.5" y1="6.8" x2="11.5" y2="9.8" stroke="#3370ff" stroke-width=".9" opacity=".4"/></svg>
        <span>社交媒体数据知识图谱</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <section class="mn">
    <div class="hd">
      <div class="hd-r1">
        <h2 class="hd-t">社交媒体数据知识图谱</h2>
        <div class="hd-a">
          <button class="bi" title="刷新"><svg width="14" height="14" viewBox="0 0 48 48" fill="none"><path d="M42 8v12h-12" stroke="#4e5969" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 24c0-9.94 8.06-18 18-18 6.63 0 12.43 3.58 15.57 8.93L42 20" stroke="#4e5969" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 40V28h12" stroke="#4e5969" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M42 24c0 9.94-8.06 18-18 18-6.63 0-12.43-3.58-15.57-8.93L6 28" stroke="#4e5969" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button class="bi" title="全屏"><svg width="14" height="14" viewBox="0 0 48 48" fill="none"><path d="M42 18V6H30M6 30v12h12M30 42h12V30M18 6H6v12" stroke="#4e5969" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button class="bo">查看实体配置</button>
          <button class="bo">编辑主体模型</button>
          <button class="bp">构建知识图谱</button>
        </div>
      </div>
      <div class="mt"><span>关联知识库：<b class="lk">3 个</b></span><span>创建人：<b>admin</b></span><span>更新时间：<b>2026-03-09 14:30:22</b></span><span>创建时间：<b>2026-03-09 10:15:33</b></span></div>
      <div class="ds">描述：<b>社交媒体多模态知识图谱</b></div>
      <div class="tb"><a class="on">知识图谱</a><a>知识召回测试</a></div>
    </div>

    <div class="gs">
      <div class="gbar">
        <button class="gb"><svg width="13" height="13" viewBox="0 0 48 48" fill="none"><path d="M42 8v12h-12M6 40V28h12" stroke="#4e5969" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 24c0-9.94 8.06-18 18-18 6.63 0 12.43 3.58 15.57 8.93L42 20M42 24c0 9.94-8.06 18-18 18-6.63 0-12.43-3.58-15.57-8.93L6 28" stroke="#4e5969" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <select class="gsel" aria-label="过滤"><option>*</option></select>
        <input class="gin" type="text" placeholder="Search node" aria-label="Search node">
        <div class="grt"><span>构建进度</span><div class="prog"><div class="prog-in"></div></div><span>1/1</span></div>
      </div>

      <div class="cw" id="wrap">
        <canvas id="cv"></canvas>

        <!-- Detail Panel -->
        <div class="panel" id="panel">
          <div class="panel-hd">
            <h4><span class="dot" id="pDot"></span><span id="pTitle"></span></h4>
            <button class="panel-close" id="pClose"><svg width="16" height="16" viewBox="0 0 48 48" fill="none"><path d="M14 14l20 20M34 14L14 34" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/></svg></button>
          </div>
          <div class="panel-body" id="pBody"></div>
        </div>

        <div class="tls">
          <button title="框选"><svg width="14" height="14" viewBox="0 0 48 48" fill="none"><rect x="6" y="6" width="36" height="36" rx="2" stroke="#4e5969" stroke-width="3" stroke-dasharray="6 3"/></svg></button>
          <button title="复制"><svg width="14" height="14" viewBox="0 0 48 48" fill="none"><rect x="14" y="14" width="28" height="28" rx="3" stroke="#4e5969" stroke-width="3"/><path d="M34 14V9a3 3 0 00-3-3H9a3 3 0 00-3 3v22a3 3 0 003 3h5" stroke="#4e5969" stroke-width="3"/></svg></button>

    cate: {

        ['GMV', '12.8亿/月'],
        ['关联品牌数', '356'],
      ]
    },
  };

  const nmap = {};
  nodes.forEach(n => nmap[n.id] = n);

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = wrap.clientWidth - (panel.classList.contains('show') ? 360 : 0);
    H = wrap.clientHeight;
    cv.width = W * dpr;
    cv.height = H * dpr;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const px=70,py=40;
    const iw=W-px*2, ih=H-py*2;
    nodes.forEach(n => { n.x = px + n.rx*iw; n.y = py + n.ry*ih; });
  }

  function hex2rgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

  function drawEdge(a, b, dash, label, highlight){
    const dx=b.x-a.x, dy=b.y-a.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len, ny=dx/len;
    const off=Math.min(len*.13, 38);
    const mx=(a.x+b.x)/2+nx*off, my=(a.y+b.y)/2+ny*off;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.quadraticCurveTo(mx,my,b.x,b.y);
    if(highlight){
      ctx.strokeStyle = C.blue;
      ctx.lineWidth = 2.2;
      ctx.globalAlpha = .7;
    } else {
      ctx.strokeStyle = '#d0d3d8';
      ctx.lineWidth = 1.2;
    }
    if(dash) ctx.setLineDash([6,4]);
    ctx.stroke();
    ctx.restore();
    // label
    if(label){
      const lx=.25*a.x+.5*mx+.25*b.x;
      const ly=.25*a.y+.5*my+.25*b.y-5;
      ctx.save();
      ctx.font = '400 10px "PingFang SC",-apple-system,"Microsoft YaHei",sans-serif';
      const tw=ctx.measureText(label).width;
      ctx.fillStyle = 'rgba(255,255,255,.88)';
      ctx.fillRect(lx-tw/2-4, ly-7, tw+8, 14);
      ctx.fillStyle = highlight ? C.blue : '#86909c';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, lx, ly);
      ctx.restore();
    }
  }

  function drawNode(n, isHovered, isSelected){
    const {x,y,r,color,label} = n;
    const grow = isHovered ? 3 : isSelected ? 2 : 0;
    const R = r + grow;
    ctx.save();
    // Glow
    if(isHovered || isSelected){
      ctx.shadowColor = color;
      ctx.shadowBlur = 16;
    } else {
      ctx.shadowColor = 'rgba(0,0,0,.12)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;
    }
    // Gradient
    const g = ctx.createRadialGradient(x-R*.22,y-R*.28,R*.05,x,y,R);
    const [cr,cg,cb] = hex2rgb(color);
    g.addColorStop(0, `rgba(${Math.min(255,cr+60)},${Math.min(255,cg+60)},${Math.min(255,cb+60)},1)`);
    g.addColorStop(1, color);
    ctx.beginPath();
    ctx.arc(x,y,R,0,Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
    // White rim
    ctx.shadowColor = 'transparent';
    ctx.beginPath();
    ctx.arc(x,y,R,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
    // Label
    ctx.save();
    const big = r >= 22;
    ctx.font = (big ? '600 13px' : '400 12px') + ' "PingFang SC",-apple-system,"Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#1d2129';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, x, y+R+6);
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const connIds = new Set();
    if(selected || hovered){
      const fid = (selected || hovered).id;
      edges.forEach(e => { if(e.s===fid||e.t===fid){ connIds.add(e.s); connIds.add(e.t); }});
    }
    // Edges
    edges.forEach(e => {
      const hi = connIds.size > 0 && (connIds.has(e.s) && connIds.has(e.t) && (e.s===(selected||hovered).id || e.t===(selected||hovered).id));
      drawEdge(nmap[e.s], nmap[e.t], e.dash, e.label, hi);
    });
    // Nodes (small first)
    [...nodes].sort((a,b)=>a.r-b.r).forEach(n => {
      drawNode(n, n===hovered, n===selected);
    });
  }

  // Hit test
  function hitNode(mx,my){
    for(let i=nodes.length-1;i>=0;i--){
      const n=nodes[i];
      const dx=mx-n.x, dy=my-n.y;
      if(dx*dx+dy*dy<(n.r+5)*(n.r+5)) return n;
    }
    return null;
  }

  cv.addEventListener('mousemove', e => {
    const r=cv.getBoundingClientRect();
    const found = hitNode(e.clientX-r.left, e.clientY-r.top);
    if(found!==hovered){ hovered=found; cv.style.cursor=found?'pointer':'default'; draw(); }
  });

  cv.addEventListener('click', e => {
    const r=cv.getBoundingClientRect();
    const found = hitNode(e.clientX-r.left, e.clientY-r.top);
    if(found){
      selected = found;
      showPanel(found);
    } else {
      selected = null;
      panel.classList.remove('show');
      setTimeout(()=>{ resize(); draw(); }, 300);
    }
    draw();
  });

  pClose.addEventListener('click', () => {
    selected = null;
    panel.classList.remove('show');
    setTimeout(()=>{ resize(); draw(); }, 300);
    draw();
  });

  function showPanel(n){
    pDot.style.background = n.color;
    pTitle.textContent = n.label;
    const d = details[n.id] || { attrs:[] };
    // Get relations
    const rels = [];
    edges.forEach(e => {
      if(e.s === n.id) rels.push({ dir:'out', label:e.label, target: nmap[e.t] });
      if(e.t === n.id) rels.push({ dir:'in',  label:e.label, target: nmap[e.s] });
    });
    let html = '';
    // Section 1: Entity
    html += `<div class="panel-sec">
      <h5><span class="icon blue"><svg width="12" height="12" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="#3370ff" stroke-width="3"/><circle cx="24" cy="24" r="6" fill="#3370ff"/></svg></span>主体信息</h5>
      <table class="attr-tbl"><tbody>`;
    d.attrs.forEach(([k,v]) => { html += `<tr><td>${k}</td><td>${v}</td></tr>`; });
    html += `</tbody></table></div>`;
    // Section 2: Relations
    html += `<div class="panel-sec">
      <h5><span class="icon green"><svg width="12" height="12" viewBox="0 0 48 48" fill="none"><path d="M8 24h32M30 16l8 8-8 8" stroke="#43a047" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>主体关系 <span style="color:var(--text-3);font-weight:400;font-size:12px">(${rels.length})</span></h5>
      <div class="rel-list">`;
    rels.forEach(r => {
      const arrow = r.dir==='out' ? '→' : '←';
      html += `<div class="rel-item">
        <span class="rdot" style="background:${n.color}"></span>
        <span class="rname">${n.label}</span>
        <span class="arrow">${arrow}</span>
        <span class="rtype">${r.label}</span>
        <span class="arrow">${arrow}</span>
        <span class="rdot" style="background:${r.target.color}"></span>
        <span class="rname">${r.target.label}</span>
      </div>`;
    });
    html += `</div></div>`;
    // Section 3: Attributes summary
    html += `<div class="panel-sec">
      <h5><span class="icon orange"><svg width="12" height="12" viewBox="0 0 48 48" fill="none"><rect x="6" y="6" width="36" height="36" rx="4" stroke="#ef6c00" stroke-width="3"/><line x1="16" y1="18" x2="32" y2="18" stroke="#ef6c00" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="26" x2="28" y2="26" stroke="#ef6c00" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="34" x2="24" y2="34" stroke="#ef6c00" stroke-width="3" stroke-linecap="round"/></svg></span>主体属性</h5>
      <table class="attr-tbl"><tbody>
        <tr><td>节点类型</td><td><span class="tag blue">${n.type}</span></td></tr>
        <tr><td>关联边数</td><td>${rels.length} 条</td></tr>
        <tr><td>出边</td><td>${rels.filter(r=>r.dir==='out').length} 条</td></tr>
        <tr><td>入边</td><td>${rels.filter(r=>r.dir==='in').length} 条</td></tr>
        <tr><td>图谱层级</td><td>${n.r>=24?'核心节点 (L0)':n.r>=17?'一级节点 (L1)':'二级节点 (L2)'}</td></tr>
        <tr><td>节点颜色</td><td><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${n.color};vertical-align:middle;margin-right:6px"></span>${n.color}</td></tr>
      </tbody></table></div>`;
    pBody.innerHTML = html;
    panel.classList.add('show');
    setTimeout(()=>{ resize(); draw(); }, 50);
  }

  function init(){ resize(); draw(); }
  window.addEventListener('resize', ()=>{ resize(); draw(); });
  init();
})();
