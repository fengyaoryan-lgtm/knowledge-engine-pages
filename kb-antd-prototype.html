    .folder-item.active{background:#e8f3ff;color:#1677ff}
    .content-area{flex:1;padding:16px 20px;overflow-y:auto;background:#f5f6f7}

    .chunk-header{background:#fff;border-bottom:1px solid #e8e8e8;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
    .strategy-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
    .strategy-card{background:#fff;border:2px solid #e8e8e8;border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
  return (bytes/1073741824).toFixed(1) + ' GB';
}
function fileIcon(type) {
  const m = {
    excel: React.createElement(FileExcelOutlined, {style:{color:'#52c41a',fontSize:16}}),
    pdf: React.createElement(FilePdfOutlined, {style:{color:'#ff4d4f',fontSize:16}}),
    word: React.createElement(FileWordOutlined, {style:{color:'#1677ff',fontSize:16}}),
    markdown: React.createElement(FileMarkdownOutlined, {style:{color:'#722ed1',fontSize:16}})
  };
  return m[type] || React.createElement(FileTextOutlined);
}
function highlightText(text, keyword) {
  if (!keyword) return text;
  const idx = text.toLowerCase().indexOf(keyword.toLowerCase());
  if (idx === -1) return text;
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('span', {className:'search-highlight'}, text.slice(idx, idx+keyword.length)),
    text.slice(idx+keyword.length)
  );
}

// ============================
// App
// ============================
function App() {
  const [page, setPage] = useState('list');
  const [selectedKB, setSelectedKB] = useState(null);
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [chunkTab, setChunkTab] = useState('config');

  return React.createElement(ConfigProvider,{theme:{token:{colorPrimary:'#1677ff',borderRadius:6,fontFamily:"-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif"}}},
    React.createElement(TopNav,{onGoHome:()=>{setPage('list');setSelectedKB(null);setSelectedDoc(null)}}),
    page==='list' && React.createElement(KBListPage,{
      onSelectKB:kb=>{setSelectedKB(kb);setPage('detail')},
      onGoChunkConfig:(doc,tab)=>{setSelectedDoc(doc);setChunkTab(tab||'config');setPage('chunk')}
    }),
    page==='detail' && selectedKB && React.createElement(KBDetailPage,{
      kb:selectedKB,
      onBack:()=>{setPage('list');setSelectedKB(null)},
      onGoChunkConfig:(doc,tab)=>{setSelectedDoc(doc);setChunkTab(tab||'config');setPage('chunk')}
    }),
    page==='chunk' && React.createElement(ChunkConfigPage,{
      doc:selectedDoc,
      initialTab:chunkTab,
      onBack:()=>{setPage(selectedKB?'detail':'list')}
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
